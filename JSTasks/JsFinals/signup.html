<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Wello - Create Account</title>
	<link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="auth-style.css">
</head>

<body>
	<header class="header">
		<h2 class="header-logo">W<span class="header-e">e</span>ll<span class="header-o">o</span></h2>
		<nav class="header-nav">
			<ul class="nav-ul">
				<li class="nav-li"><a href=".">Home</a></li>
				<li class="nav-li"><a href=".">Pricing</a></li>
				<li class="nav-li"><a href=".">About Us</a></li>
				<li class="nav-li"><a href="./contact.html">Contact</a></li>
			</ul>
		</nav>
		<div class="header-buttons">
			<a href="." class="btn btn-nobg btn-faqs">FAQ's</a>
		</div>
	</header>
	<main class="main">
		<div class="image-section">
			<img src="./asserts/bg-image-1.png" alt="signup-page-image" />
			<div class="overlay-text">
				<h2>Create Your Vision</h2>
				<p>Workspace to craft and elevate your ideas</p>
			</div>
		</div>
		<div class="form-section">
			<p class="form-validation-msg">ooko</p>
			<h2>Create An Account</h2>
			<form action="" id="user-signup-form">
				<input class="input-field" type="text" placeholder="Name" id="username" name="username" required>
				<input class="input-field" type="email" name="email" id="email" placeholder="Enter Your Email" required>
				<input class="input-field" type="password" placeholder="Password" id="password" name="password" required>
				<input class="input-field" type="password" name="confirmPassword" id="confirm-password" placeholder="Confirm Password" required>
				<input type="submit" value="Create an Account">
			</form>
			<p>Already Have an account? <a href="./login.html" class="auth-links">Login</a></p>
		</div>
	</main>
	<script src="./auth.js"></script>
</body>

</html>
