<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Api Form</title>
</head>
<body>
	<form id="postform">
		<label for="username">User Name: </label>
		<input type="text" id="username" placeholder="Enter the username">
		<label for="password">Password: </label>
		<input type="password" id="password" placeholder="Enter the password" min="8" >
		<input type="submit" value="submit">
		<button type="button" onclick="updateUser()">Update</button>
		<button type="button" id="delete-btn" onclick="deleteUser()">Delete</button>
	</form>
	<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
	<script  src="script.js"></script>
</body>
</html>
