<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bill </title>
	<link rel="stylesheet" href="./styles.css">
</head>
<body>
	<div class="bill-view">
		<h3 class="heading">Bill</h3>
		<table class="table-view">
			<tr>
				<td>Name: </td>
				<td class="name"></td>
			</tr>
			<tr>
				<td>Email: </td>
				<td class="email"></td>
			</tr>
			<tr>
				<td>City: </td>
				<td class="city"></td>
			</tr>
			<tr>
				<td>Discount: </td>
				<td class="discount"></td>
			</tr>
			<tr>
				<td>Copuon code: </td>
				<td class="copuon-code-discount"></td>
			</tr>
			<tr>
				<td>Delivery charges: </td>
				<td class="delivery-charges"></td>
			</tr>
			<tr>
				<td>Gst </td>
				<td class="gst-amount"></td>
			</tr>
			<tr>
				<td>Total Amount: </td>
				<td class="order-total-amount"></td>
			</tr>
		</table>
	</div>
	<script src="./Order.js"></script>
</body>
</html>
