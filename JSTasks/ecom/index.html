<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Asfaro FootWear</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<header>
		<h2 class="company-logo">AsfaroFoots</h2>
		<nav>
			<ul>
				<li><a href=".">Home</a></li>
				<li><a href="#products">Products</a></li>
			</ul>
		</nav>
	</header>
	<section id="home">
		<img class = "hero-bg-image" src="./asserts/people-with-shoes-sitting on container.jpg" alt="people with shoes sitting on container">
		<div class="hero-text-container">
			<h2 class="hero-text-heading">' Discover your next favorite ,</h2>
			<p class="hero-text-description">A place where your desires come alive with the products your feet wants</p>
			<div class="hero-text-buttons">
				<button type="button" class="btn btn1-hero">Today's Deals</button>
				<button type="button" class="btn btn2-hero">Suprise Me</button>
			</div>
		</div>
	</section>
	<main id="products">
		<h2>Products</h2>
		<div class="products-display">
			<!--Render the products from js-->
			<div class="product-panel"></div>
		<aside>
			<h2>Filter orders</h2>
			<form action="" id="filter-form">
				<div class="form-categories"></div>
				<label for="price-range" class="price-range">Price Range: </label>
				<input type="range" name="price" id="price-range">
				<button type="submit" class="btn btn-filter">Filter</button>
			</form>
		</aside>
		</div>
	</main>
	<footer>
		&copy; 2026 , Asfaro Footwears Inc
	</footer>
	<script type="module" src="script.js"></script>
</body>
</html>
